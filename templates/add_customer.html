{% extends "base.html" %}

{% block title %}Add Customer - Daily Collection System{% endblock %}

{% block content %}
<!-- Page Title -->
<div class="page-title">
    <i class="bi bi-person-plus me-2"></i>Add New Customer
</div>

<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-person-plus me-2"></i>Customer Information
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row">
                        <!-- Photo Upload -->
                        <div class="col-md-4 mb-4">
                            <label class="form-label">Customer Photo</label>
                            <div class="upload-area" id="uploadArea" onclick="document.getElementById('photo').click()">
                                <input type="file" 
                                       id="photo" 
                                       name="photo" 
                                       accept="image/*" 
                                       style="display: none;"
                                       onchange="previewImage(event)">
                                <div id="imagePreviewContainer" style="display: none;">
                                    <img id="imagePreview" src="" alt="Preview" 
                                         style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
                                </div>
                                <div id="uploadIcon">
                                    <i class="bi bi-cloud-arrow-up"></i>
                                    <p>Click to upload photo</p>
                                </div>
                            </div>
                        </div>

                        <!-- Customer Details -->
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label class="form-label">Customer Name *</label>
                                <input type="text" 
                                       class="form-control" 
                                       name="name" 
                                       placeholder="Enter customer full name"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mobile Number *</label>
                                <input type="tel" 
                                       class="form-control" 
                                       name="mobile" 
                                       placeholder="Enter mobile number"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" 
                                          name="address" 
                                          rows="2" 
                                          placeholder="Enter customer address"></textarea>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4">

                    <!-- Loan Checkbox -->
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" 
                                   type="checkbox" 
                                   id="hasLoan"
                                   name="has_loan"
                                   onchange="toggleLoanField()">
                            <label class="form-check-label fw-bold" for="hasLoan">
                                Customer Has Loan
                            </label>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3" id="loanAmountField" style="display: none;">
                            <label class="form-label">Loan Amount (₹)</label>
                            <input type="number" 
                                   class="form-control" 
                                   name="loan_amount" 
                                   id="loan_amount_input"
                                   placeholder="Enter loan amount"
                                   min="0">
                        </div>

                        <div class="col-md-6 mb-3" id="initialPaymentField" style="display: none;">
                            <label class="form-label">Initial Payment (₹)</label>
                            <input type="number" 
                                   class="form-control" 
                                   name="initial_payment" 
                                   id="initial_payment_input"
                                   placeholder="Enter initial payment"
                                   min="0"
                                   value="0">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-2"></i>Create Customer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function toggleLoanField() {
    const checkbox = document.getElementById('hasLoan');
    const loanField = document.getElementById('loanAmountField');
    const loanInput = document.getElementById('loan_amount_input');
    const initialPaymentField = document.getElementById('initialPaymentField');
    
    if (checkbox.checked) {
        loanField.style.display = 'block';
        initialPaymentField.style.display = 'block';
        loanInput.required = true;
    } else {
        loanField.style.display = 'none';
        initialPaymentField.style.display = 'none';
        loanInput.required = false;
        loanInput.value = 0;
        // Reset initial payment to 0 when hiding
        const initialPaymentInput = document.getElementById('initial_payment_input');
        if (initialPaymentInput) {
            initialPaymentInput.value = 0;
        }
    }
}

function previewImage(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('imagePreview').src = e.target.result;
            document.getElementById('imagePreviewContainer').style.display = 'block';
            document.getElementById('uploadIcon').style.display = 'none';
        }
        reader.readAsDataURL(file);
    }
}

// Drag and drop functionality
const uploadArea = document.getElementById('uploadArea');

uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.style.borderColor = '#3b82f6';
    uploadArea.style.background = '#f8fafc';
});

uploadArea.addEventListener('dragleave', (e) => {
    e.preventDefault();
    uploadArea.style.borderColor = '#cbd5e1';
    uploadArea.style.background = 'white';
});

uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.style.borderColor = '#cbd5e1';
    uploadArea.style.background = 'white';
    
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        document.getElementById('photo').files = files;
        previewImage({ target: { files: files } });
    }
});
</script>

<style>
.upload-area {
    border: 2px dashed #cbd5e1;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: #f8fafc;
    height: 100%;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.upload-area:hover {
    border-color: #3b82f6;
    background: #eff6ff;
}

.upload-area i {
    font-size: 48px;
    color: #94a3b8;
    margin-bottom: 12px;
}

.upload-area p {
    color: #64748b;
    margin: 0;
    font-size: 14px;
}

#imagePreviewContainer img {
    border: 3px solid #e2e8f0;
}
</style>
{% endblock %}
